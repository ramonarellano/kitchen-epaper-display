[platformio]
default_envs = pico
src_dir = .

[env:pico]
platform = raspberrypi
board = pico
framework = pico-sdk

; This project keeps sources in repo root, examples/, and lib/.
build_src_filter =
	+<main.c>
	+<examples/EPD_7in3f_test.c>
	+<examples/ImageData.c>
	+<examples/run_File.c>
	+<lib/Config/DEV_Config.c>
	+<lib/Config/hw_config.c>
	+<lib/e-Paper/EPD_7in3f.c>
	+<lib/RTC/waveshare_PCF85063.c>
	+<lib/GUI/GUI_BMPfile.c>
	+<lib/GUI/GUI_Paint.c>
	+<lib/led/led.c>
	+<lib/FatFs_SPI/ff14a/source/ff.c>
	+<lib/FatFs_SPI/ff14a/source/ffsystem.c>
	+<lib/FatFs_SPI/ff14a/source/ffunicode.c>
	+<lib/FatFs_SPI/sd_driver/crc.c>
	+<lib/FatFs_SPI/sd_driver/demo_logging.c>
	+<lib/FatFs_SPI/sd_driver/sd_card.c>
	+<lib/FatFs_SPI/sd_driver/sd_spi.c>
	+<lib/FatFs_SPI/sd_driver/spi.c>
	+<lib/FatFs_SPI/src/f_util.c>
	+<lib/FatFs_SPI/src/ff_stdio.c>
	+<lib/FatFs_SPI/src/glue.c>
	+<lib/FatFs_SPI/src/my_debug.c>
	+<lib/FatFs_SPI/src/rtc.c>
	-<build/>
	-<tests/>
	-<test/>

build_flags =
	-Iexamples
	-Ilib/Config
	-Ilib/e-Paper
	-Ilib/RTC
	-Ilib/Fonts
	-Ilib/GUI
	-Ilib/led
	-Ilib/FatFs_SPI/include
	-Ilib/FatFs_SPI/ff14a/source
	-Ilib/FatFs_SPI/sd_driver

monitor_speed = 115200
; Auto-detect Pico by USB VID:PID so the port works after any reconnect.
; 2E8A:000A is the standard Raspberry Pi Pico USB CDC ID.
monitor_port = hwgrep://2E8A:000A
monitor_filters =
	time
	colorize
